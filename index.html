<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏠 RentEase</h1>
  <nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('login')">Login</button>
    <button onclick="showSection('dashboard')">Dashboard</button>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="active">
  <h2>Welcome to RentEase</h2>
  <p>✔ Manage Properties Easily</p>
  <p>✔ Track Rent Payments</p>
  <p>✔ Manage Tenants</p>
  <button class="action" onclick="showSection('login')">Get Started</button>
</section>

<!-- LOGIN -->
<section id="login">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username (owner/tenant)">
  <input type="password" id="password" placeholder="Password (1234)">
  <button class="action" onclick="login()">Login</button>
</section>
